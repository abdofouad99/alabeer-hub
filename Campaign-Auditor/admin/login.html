<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — مدقق الحملات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family:'Cairo'; background:#080c14; color:#fff; margin:0; display:flex; align-items:center; justify-content:center; height:100vh; }
        body::before { content:''; position:fixed; inset:0; background:radial-gradient(circle at 50% 40%, rgba(0,255,136,0.04) 0%, transparent 50%); pointer-events:none; }
        .login-box { background:rgba(0,255,136,0.04); padding:40px; border-radius:16px; border:1px solid rgba(0,255,136,0.2); width:380px; text-align:center; backdrop-filter:blur(20px); position:relative; z-index:1; }
        .login-box h2 { background:linear-gradient(135deg,#00ff88,#00e5ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-size:22px; margin-bottom:5px; }
        .login-box p { color:#9ab0a8; font-size:13px; margin-bottom:25px; }
        input { width:100%; padding:12px; margin-bottom:15px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:#fff; border-radius:10px; box-sizing:border-box; font-family:'Cairo'; font-size:14px; outline:none; transition:border 0.3s; }
        input:focus { border-color:#00ff88; }
        button { width:100%; padding:14px; background:linear-gradient(135deg,#00ff88,#00cc6a); border:none; color:#080c14; font-weight:700; border-radius:10px; cursor:pointer; font-family:'Cairo'; font-size:16px; transition:all 0.3s; }
        button:hover { box-shadow:0 4px 20px rgba(0,255,136,0.3); transform:translateY(-2px); }
        .error { color:#ff3b3b; margin-bottom:15px; display:none; font-size:14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🩺 دخول الإدارة</h2>
        <p>مدقق الحملة الإعلانية — لوحة التحكم</p>
        <div id="errorMsg" class="error"></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit">الدخول للوحة</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const res = await fetch('../api/admin/auth.php', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({email:document.getElementById('email').value, password:document.getElementById('password').value}) });
            const data = await res.json();
            if (data.success) { window.location.href='dashboard.html'; } else { const err=document.getElementById('errorMsg'); err.innerText=data.message; err.style.display='block'; }
        });
    </script>
</body>
</html>

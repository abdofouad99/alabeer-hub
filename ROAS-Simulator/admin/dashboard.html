<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة القيادة المتقدمة | ROAS Simulator</title>
    <!-- CSS الأساسي للثيم المالي -->
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .dashboard-container { max-width: 1200px; padding: 20px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); text-align: center; }
        .stat-card h3 { font-size: 1rem; color: var(--text-muted); margin-bottom: 10px; }
        .stat-card .val { font-size: 2rem; font-weight: bold; color: var(--gold); }
        .stat-card.bleeding .val { color: var(--neon-red); }
        .stat-card.profitable .val { color: var(--neon-green); }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid var(--border-color); }
        th { background: #0f172a; color: var(--text-muted); font-size: 0.95rem; }
        tr:hover { background: rgba(255,255,255,0.02); }
        
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: inline-block; }
        .badge.bleeding { background: rgba(239, 68, 68, 0.2); color: var(--neon-red); }
        .badge.breakeven { background: rgba(245, 158, 11, 0.2); color: var(--gold); }
        .badge.profitable { background: rgba(16, 185, 129, 0.2); color: var(--neon-green); }

        .btn-logout { background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); padding: 8px 16px; border-radius: 6px; cursor: pointer; float: left; }
        .btn-export { background: var(--neon-green); border: none; color: white; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div style="overflow: hidden; margin-bottom: 30px;">
        <h1 style="float: right; color: var(--gold);">إدارة عملاء ROAS</h1>
        <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
    </div>

    <!-- شبكة الإحصائيات -->
    <div class="stats-grid">
        <div class="stat-card">
            <h3>إجمالي العملاء</h3>
            <div class="val" id="total_leads">0</div>
        </div>
        <div class="stat-card">
            <h3>مجموع الميزانيات المحللة</h3>
            <div class="val" id="total_budget">0 ر.س</div>
        </div>
        <div class="stat-card bleeding">
            <h3>في حالة نزيف (خسارة)</h3>
            <div class="val" id="total_bleeding">0</div>
        </div>
        <div class="stat-card profitable">
            <h3>في حالة نضج (ربح)</h3>
            <div class="val" id="total_profitable">0</div>
        </div>
    </div>

    <button class="btn-export" onclick="exportData()">⬇️ تصدير البيانات إلى Excel (CSV)</button>

    <!-- جدول العملاء -->
    <div style="overflow-x: auto; border: 1px solid var(--border-color); border-radius: 12px;">
        <table>
            <thead>
                <tr>
                    <th>التاريخ</th>
                    <th>العميل</th>
                    <th>رقم التواصل</th>
                    <th>الميزانية</th>
                    <th>CPA الحالية</th>
                    <th>الخسارة/الربح الحالي</th>
                    <th>الحالة المالية</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="7" style="text-align:center;">جاري تحميل البيانات...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="../js/admin.js"></script>

</body>
</html>

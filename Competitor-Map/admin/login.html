<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول — خريطة المنافسين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0A0A0F; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        body::before { content:''; position:fixed; inset:0; background: radial-gradient(circle at 30% 30%, rgba(255,61,46,0.06) 0%, transparent 50%); pointer-events:none; }
        .login-box { background: rgba(255, 60, 30, 0.04); padding: 40px; border-radius: 16px; border: 1px solid rgba(255, 80, 40, 0.25); width: 380px; text-align: center; backdrop-filter: blur(20px); position: relative; z-index: 1; }
        .login-box h2 { background: linear-gradient(135deg, #FF3D2E, #FF6B35); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 22px; margin-bottom: 5px; }
        .login-box p { color: #9A9AB0; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: #fff; border-radius: 10px; box-sizing: border-box; font-family: 'Cairo'; font-size: 14px; outline: none; transition: border 0.3s; }
        input:focus { border-color: #FF3D2E; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #FF3D2E, #FF6B35); border: none; color: #fff; font-weight: 700; border-radius: 10px; cursor: pointer; font-family: 'Cairo'; font-size: 16px; transition: all 0.3s; }
        button:hover { box-shadow: 0 4px 20px rgba(255,61,46,0.4); transform: translateY(-2px); }
        .error { color: #FF3B30; margin-bottom: 15px; display: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>⚔️ دخول الإدارة</h2>
        <p>نظام خريطة المنافسين — لوحة التحكم</p>
        <div id="errorMsg" class="error"></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit">الدخول للوحة</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('../api/admin/auth.php', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    const err = document.getElementById('errorMsg');
                    err.innerText = data.message;
                    err.style.display = 'block';
                }
            } catch (err) {
                alert('خطأ في الاتصال بالخادم!');
            }
        });
    </script>
</body>
</html>

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: alabeer_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: alabeer_analysis
      MYSQL_USER: alabeer_user
      MYSQL_PASSWORD: alabeer_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema_mysql.sql:/docker-entrypoint-initdb.d/schema.sql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: alabeer_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  php:
    image: php:8.1-apache
    container_name: alabeer_php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./api/.htaccess:/var/www/html/.htaccess
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
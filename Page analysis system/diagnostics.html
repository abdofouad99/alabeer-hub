<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostics — العبير</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --panel: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --gray: #94a3b8;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      --primary: #f58e1a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 24px; min-height: 100vh; }
    .header { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .header h1 { font-size: 24px; font-weight: 900; margin-bottom: 8px; color: var(--primary); }
    .header .meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-top: 16px; }
    .meta-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 8px; }
    .meta-item label { font-size: 11px; color: var(--gray); display: block; margin-bottom: 4px; }
    .meta-item value { font-size: 14px; font-weight: 700; }

    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 16px; }
    .stat { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
    .stat .num { font-size: 28px; font-weight: 900; }
    .stat .lbl { font-size: 12px; color: var(--gray); margin-top: 4px; }
    .stat.ok .num    { color: var(--green); }
    .stat.err .num   { color: var(--red); }
    .stat.warn .num  { color: var(--yellow); }

    .controls { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
    .controls input[type="text"] { background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; min-width: 260px; flex: 1; font-family: inherit; }
    .controls button { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .controls button.secondary { background: rgba(255,255,255,0.06); }
    .controls .filter-chip { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 8px 14px; border-radius: 999px; font-size: 12px; cursor: pointer; user-select: none; transition: 0.2s; }
    .controls .filter-chip.active { background: var(--primary); border-color: var(--primary); }

    .timeline { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 8px; }
    .event { border-bottom: 1px solid var(--border); padding: 10px 12px; transition: background 0.15s; }
    .event:last-child { border-bottom: none; }
    .event:hover { background: rgba(255,255,255,0.02); }
    .event-row { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .event-time { font-family: 'Courier New', monospace; font-size: 12px; color: var(--gray); min-width: 60px; }
    .event-icon { font-size: 14px; min-width: 18px; text-align: center; }
    .event-stage { font-weight: 700; font-size: 13px; flex: 1; }
    .event-stage.ERR { color: var(--red); }
    .event-stage.WRN { color: var(--yellow); }
    .event-toggle { color: var(--gray); font-size: 11px; }
    .event-data { display: none; margin-top: 8px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'Courier New', monospace; font-size: 12px; color: #cbd5e1; line-height: 1.6; max-height: 600px; overflow: auto; white-space: pre-wrap; word-break: break-all; }
    .event.expanded .event-data { display: block; }
    .event.hidden { display: none; }

    .empty { padding: 40px; text-align: center; color: var(--gray); }
    .loading { padding: 40px; text-align: center; color: var(--primary); font-size: 16px; }
    .error-box { background: rgba(239,68,68,0.1); border: 1px solid var(--red); border-radius: 12px; padding: 16px; color: var(--red); margin-bottom: 16px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>🔍 Diagnostics — تشخيص الفحص</h1>
    <div id="metaInfo" class="meta-grid">
      <div class="loading">جاري التحميل...</div>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="controls">
    <input type="text" id="searchBox" placeholder="🔎 ابحث في المراحل (مثلاً: ads.openai أو facebook)">
    <span class="filter-chip active" data-filter="all">الكل</span>
    <span class="filter-chip" data-filter="errors">الأخطاء</span>
    <span class="filter-chip" data-filter="warnings">التحذيرات</span>
    <span class="filter-chip" data-filter="apify">Apify</span>
    <span class="filter-chip" data-filter="openai">OpenAI</span>
    <span class="filter-chip" data-filter="gemini">Gemini</span>
    <span class="filter-chip" data-filter="db">DB</span>
    <button class="secondary" id="expandAllBtn">فتح الكل</button>
    <button class="secondary" id="collapseAllBtn">طي الكل</button>
    <button id="reloadBtn">⟳ إعادة تحميل</button>
  </div>

  <div class="timeline" id="timeline">
    <div class="loading">جاري التحميل...</div>
  </div>

  <script src="js/diagnostics-page.js?v=1.0"></script>
</body>
</html>

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: alabeer_analysis
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v3

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: pdo, pdo_mysql, curl, json, zip

    - name: Install Composer dependencies
      run: composer install --no-progress --prefer-dist --optimize-autoloader

    - name: Install Node.js dependencies
      run: npm install

    - name: Setup database
      run: |
        mysql -h 127.0.0.1 -u root -prootpassword < database/schema_mysql.sql
        php api/migrate.php

    - name: Create directories
      run: mkdir -p logs cache

    - name: Run tests
      run: composer test

    - name: Run API tests
      run: |
        curl -f http://localhost/api/test-cache.php || exit 1
        curl -f http://localhost/api/test-log.php || exit 1
        curl -f http://localhost/api/test-rate-limit.php || exit 1

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to production
      run: echo "Deploy to production server"

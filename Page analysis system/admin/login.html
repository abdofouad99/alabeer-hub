<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | مركز القيادة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #060608;
      --glass-bg: rgba(255,255,255,0.9);
      --glass-border: rgba(0,0,0,0.09);
      --text-dark: #0f172a;
      --text-gray: #475569;
      --primary: #f58e1a;
      --red: #ef4444;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
    body { background: var(--bg-main); color: var(--text-dark); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
    
    .bg-orb { position: absolute; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.2; }
    .orb-1 { top: -100px; right: -100px; width: 500px; height: 500px; background: var(--primary); }
    .orb-2 { bottom: -100px; left: -100px; width: 400px; height: 400px; background: var(--red); }

    .login-container {
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .brand span { color: var(--primary); }
    
    .subtitle {
      color: var(--text-gray);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 32px;
    }

    .input-group { margin-bottom: 20px; text-align: right; }
    .input-label { display: block; font-size: 13px; font-weight: 700; color: var(--text-gray); margin-bottom: 8px; }
    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.9);
      border: 1px solid var(--glass-border);
      color: #fff;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      transition: 0.3s;
    }
    .input-field:focus { border-color: var(--primary); background: rgba(255,255,255,0.9); }
    
    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, #f58e1a, #ef4444);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
      box-shadow: 0 10px 20px -10px rgba(245, 142, 26, 0.5);
    }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(245, 142, 26, 0.6); }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 20px;
      display: none;
    }
  
/* ── Theme Toggle ────────────────────────── */
#themeToggle{position:fixed;bottom:24px;left:24px;z-index:99999;width:54px;height:54px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:24px;transition:all .3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.4);background:linear-gradient(135deg,#1e1b4b,#312e81);}
#themeToggle:hover{transform:scale(1.12) rotate(15deg);}
body.light-mode{background:#f8fafc!important;color:#0f172a!important;}
body.light-mode #themeToggle{background:linear-gradient(135deg,#fbbf24,#f59e0b);border-color:rgba(245,158,11,0.3);box-shadow:0 4px 20px rgba(245,158,11,0.4);}
body.light-mode .orb,.light-mode .o1,.light-mode .o2,.light-mode .bg-orb{opacity:0.04!important;}
body.light-mode .glass-card,body.light-mode .card,body.light-mode .phase,body.light-mode .step,body.light-mode .axis-card,body.light-mode .rec-card,body.light-mode .sw-box,body.light-mode .plan-summary,body.light-mode .cta-box,body.light-mode [class*="card"]{background:rgba(255,255,255,0.92)!important;border-color:rgba(0,0,0,0.08)!important;box-shadow:0 2px 12px rgba(0,0,0,0.07)!important;color:#0f172a!important;}
body.light-mode input,body.light-mode select,body.light-mode textarea{background:#fff!important;color:#0f172a!important;border-color:rgba(0,0,0,0.12)!important;}
body.light-mode input::placeholder,body.light-mode textarea::placeholder{color:#94a3b8!important;}
body.light-mode header,body.light-mode nav,body.light-mode .topbar{background:rgba(255,255,255,0.92)!important;border-color:rgba(0,0,0,0.08)!important;box-shadow:0 2px 8px rgba(0,0,0,0.06)!important;}
body.light-mode .step-row,body.light-mode .step-desc,body.light-mode .sub,body.light-mode .muted,.light-mode [style*="color:var(--gray)"],.light-mode [style*="color:var(--text-gray)"]{color:#64748b!important;}
body.light-mode h1,body.light-mode h2,body.light-mode h3,body.light-mode h4{color:#0f172a!important;-webkit-text-fill-color:#0f172a!important;}
body.light-mode p{color:#334155!important;}

</style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="login-container">
    <div class="brand">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
      <span>مركز</span> القيادة
    </div>
    <div class="subtitle">قم بتسجيل الدخول للوصول إلى لوحة الإدارة</div>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="input-group">
        <label class="input-label">البريد الإلكتروني</label>
        <input type="email" id="email" class="input-field" placeholder="admin@alabeer.com" required dir="ltr">
      </div>
      <div class="input-group">
        <label class="input-label">كلمة المرور</label>
        <input type="password" id="password" class="input-field" placeholder="••••••••" required dir="ltr">
      </div>
      <button type="submit" class="btn-login" id="btnSubmit">دخول آمن</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnSubmit');
      const err = document.getElementById('errorMsg');
      
      btn.disabled = true;
      btn.textContent = 'جاري التحقق...';
      err.style.display = 'none';

      try {
        const res = await fetch('../api/admin_login.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.ok) {
          btn.textContent = 'تم الدخول!';
          btn.style.background = 'var(--green)';
          setTimeout(() => { window.location.href = data.redirect; }, 600);
        } else {
          err.textContent = data.error;
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'دخول آمن';
        }
      } catch (error) {
        err.textContent = 'حدث خطأ في الاتصال بالسيرفر.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'دخول آمن';
      }
    });
  </script>

  <!-- Theme Toggle -->
  <button id="themeToggle" onclick="toggleTheme()" title="تبديل الثيم">🌙</button>
  <script>
    (function(){
      if(localStorage.getItem('theme')==='light'){
        document.body.classList.add('light-mode');
        var b=document.getElementById('themeToggle');
        if(b) b.textContent='☀️';
      }
    })();
    function toggleTheme(){
      document.body.classList.toggle('light-mode');
      var isLight=document.body.classList.contains('light-mode');
      localStorage.setItem('theme',isLight?'light':'dark');
      var btn=document.getElementById('themeToggle');
      if(btn) btn.textContent=isLight?'☀️':'🌙';
    }
  </script>

</body>
</html>

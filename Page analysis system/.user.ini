; PHP INI override for Local by Flywheel
; v3.0: All inline scripts extracted to external JS files (script-src 'self').
;
; CSP is handled via .htaccess Header directives (section 4).
; The auto_prepend_file approach is no longer needed and was causing
; API errors because the relative path didn't resolve from subdirectories.
;
; If .htaccess CSP override stops working in the future, use an absolute
; path like: auto_prepend_file = "/absolute/path/to/csp-override.php"
; The csp-override.php v2.0 skips API endpoints (strpos /api/) so it
; won't interfere with JSON responses.

; Force short cache TTL so .user.ini changes take effect quickly
user_ini.cache_ttl = 30

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — العبير للتسويق</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f58e1a;
      --primary-dark: #d97706;
      --primary-glow: rgba(245, 142, 26, 0.4);
      --bg-page: #F5F5F7;
      --text-main: #1D1D1F;
      --text-muted: #86868B;
      --red: #ef4444;
      --green: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 40px 20px;
      position: relative;
    }

    body::before {
      content: ''; position: fixed; top: -20%; left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(245,142,26,0.15) 0%, transparent 60%);
      filter: blur(100px); z-index: -1;
    }
    body::after {
      content: ''; position: fixed; bottom: -20%; right: -10%;
      width: 50vw; height: 50vw;
      background: radial-gradient(circle, rgba(239,68,68,0.10) 0%, transparent 60%);
      filter: blur(100px); z-index: -1;
    }

    .glass-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 32px;
      padding: 56px 48px;
      width: 100%; max-width: 480px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.12);
      animation: floatIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes floatIn {
      0%   { opacity: 0; transform: translateY(30px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card-header { text-align: center; margin-bottom: 36px; }
    .card-icon {
      width: 72px; height: 72px; background: var(--primary); color: #fff;
      border-radius: 22px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin: 0 auto 20px;
      box-shadow: 0 10px 30px var(--primary-glow);
    }
    .card-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px; }
    .card-subtitle { font-size: 15px; color: var(--text-muted); font-weight: 600; }

    .form-group { margin-bottom: 22px; }
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 10px;
    }
    .form-control {
      width: 100%; padding: 15px 18px;
      background: rgba(0,0,0,0.03);
      border: 2px solid rgba(0,0,0,0.07);
      border-radius: 12px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      color: var(--text-main);
      transition: all 0.3s ease;
    }
    .form-control:focus {
      outline: none;
      background: #fff;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(245,142,26,0.12);
    }

    .form-error {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      color: var(--red);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 20px;
      display: none;
    }
    .form-error.show { display: block; animation: shake 0.4s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .btn-primary {
      width: 100%;
      background: linear-gradient(135deg, var(--primary), #ef4444);
      color: #fff;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px -8px var(--primary-glow);
      margin-top: 8px;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px -8px var(--primary-glow);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 20px;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 700;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,0,0,0.08);
    }

    .secondary-actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      text-align: center;
    }
    .secondary-actions a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
      transition: color 0.2s;
    }
    .secondary-actions a:hover { color: var(--primary-dark); }
    .secondary-actions .muted { color: var(--text-muted); font-weight: 600; }

    .scan-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: rgba(245,142,26,0.10);
      border: 2px solid rgba(245,142,26,0.30);
      border-radius: 12px;
      color: var(--primary);
      font-weight: 800;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s;
    }
    .scan-cta:hover {
      background: rgba(245,142,26,0.18);
      transform: translateY(-1px);
    }

    @media (max-width: 520px) {
      .glass-card { padding: 36px 24px; border-radius: 24px; }
      .card-title { font-size: 24px; }
    }
  </style>
</head>
<body>

  <main class="glass-card" role="main">
    <div class="card-header">
      <div class="card-icon" aria-hidden="true">🔐</div>
      <h1 class="card-title">تسجيل الدخول</h1>
      <p class="card-subtitle">ادخل لرؤية تقاريرك السابقة وعمل تحاليل جديدة</p>
    </div>

    <div id="formError" class="form-error" role="alert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">البريد الإلكتروني</label>
        <input
          type="email"
          id="email"
          name="email"
          class="form-control"
          placeholder="example@email.com"
          required
          autocomplete="email"
          inputmode="email"
          dir="ltr"
        >
      </div>

      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <input
          type="password"
          id="password"
          name="password"
          class="form-control"
          placeholder="••••••••"
          required
          minlength="8"
          autocomplete="current-password"
          dir="ltr"
        >
      </div>

      <button type="submit" id="submitBtn" class="btn-primary">
        تسجيل الدخول
      </button>
    </form>

    <div class="divider">أو</div>

    <div class="secondary-actions">
      <span class="muted">ليس لديك حساب بعد؟</span>
      <a href="scan.html" class="scan-cta">
        <span>✨</span>
        <span>ابدأ تحليلك الأول مجاناً</span>
      </a>
    </div>
  </main>

  <script src="js/login-page.js" defer></script>
</body>
</html>

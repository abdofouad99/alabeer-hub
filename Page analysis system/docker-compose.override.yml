version: '3.8'

services:
  mysql:
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-alabeer_analysis}
      MYSQL_USER: ${MYSQL_USER:-alabeer_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-alabeer_pass}

  redis:
    # استخدم Upstash Redis في الإنتاج
    # command: redis-server --requirepass ${REDIS_PASSWORD}

  php:
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html
    volumes:
      - ./logs:/var/www/html/logs
      - ./cache:/var/www/html/cache
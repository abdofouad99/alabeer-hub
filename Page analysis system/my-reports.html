<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تقاريري — العبير للتسويق</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #f58e1a;
      --primary-dark: #d97706;
      --primary-glow: rgba(245,142,26,0.4);
      --bg-page: #F5F5F7;
      --text-main: #1D1D1F;
      --text-muted: #86868B;
      --red: #ef4444;
      --green: #10b981;
      --blue: #3b82f6;
      --yellow: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background-color: var(--bg-page);
      color: var(--text-main);
      min-height: 100vh;
      padding: 32px 20px;
      position: relative;
    }

    body::before {
      content: ''; position: fixed; top: -20%; left: -10%;
      width: 60vw; height: 60vw;
      background: radial-gradient(circle, rgba(245,142,26,0.10) 0%, transparent 60%);
      filter: blur(100px); z-index: -1;
    }

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .top-bar .brand {
      display: flex; align-items: center; gap: 12px;
      font-size: 22px; font-weight: 900;
    }
    .top-bar .brand-icon {
      width: 44px; height: 44px;
      background: var(--primary);
      color: #fff;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 20px var(--primary-glow);
    }
    .top-bar .user-area {
      display: flex; align-items: center; gap: 12px;
    }
    .top-bar .user-name {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-main);
      background: rgba(255,255,255,0.7);
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .top-bar .btn-logout {
      background: rgba(239,68,68,0.10);
      color: var(--red);
      border: 1.5px solid rgba(239,68,68,0.25);
      padding: 9px 16px;
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
    }
    .top-bar .btn-logout:hover {
      background: var(--red);
      color: #fff;
    }

    /* Hero */
    .hero {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      padding: 36px;
      margin-bottom: 28px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .hero .greeting {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 600;
    }
    .btn-new-analysis {
      background: linear-gradient(135deg, var(--primary), #ef4444);
      color: #fff;
      padding: 14px 26px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 22px -8px var(--primary-glow);
      transition: all 0.3s;
    }
    .btn-new-analysis:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px -8px var(--primary-glow);
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.04);
    }
    .stat-card .label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 24px;
      font-weight: 900;
      color: var(--text-main);
    }
    .stat-card .value.completed { color: var(--green); }
    .stat-card .value.pending { color: var(--yellow); }

    /* Reports */
    .section-title {
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    .reports-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }

    .report-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }
    .report-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 35px rgba(0,0,0,0.10);
    }
    .report-card::before {
      content: '';
      position: absolute; top: 0; right: 0; left: 0; height: 4px;
      background: linear-gradient(90deg, var(--primary), #ef4444);
    }

    .report-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 12px; margin-bottom: 12px;
    }
    .report-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .report-url {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      direction: ltr;
      word-break: break-all;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge-completed { background: rgba(16,185,129,0.12); color: var(--green); }
    .badge-pending   { background: rgba(245,158,11,0.12); color: var(--yellow); }
    .badge-failed    { background: rgba(239,68,68,0.12);  color: var(--red); }
    .badge-running   { background: rgba(59,130,246,0.12); color: var(--blue); }

    .report-meta {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      padding: 14px 0;
      border-top: 1px dashed rgba(0,0,0,0.06);
      border-bottom: 1px dashed rgba(0,0,0,0.06);
      margin: 12px 0;
    }
    .meta-item .label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 700;
      margin-bottom: 2px;
    }
    .meta-item .value {
      font-size: 14px;
      font-weight: 800;
      color: var(--text-main);
    }

    .score-circle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px; height: 48px;
      border-radius: 50%;
      font-weight: 900;
      font-size: 16px;
      color: #fff;
    }
    .score-red    { background: var(--red); }
    .score-yellow { background: var(--yellow); }
    .score-green  { background: var(--green); }
    .score-gray   { background: #94a3b8; }

    .report-actions {
      margin-top: 12px;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .btn-view {
      flex: 1;
      background: var(--primary);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-view:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }
    .btn-view.disabled {
      background: #cbd5e1;
      pointer-events: none;
      cursor: not-allowed;
    }

    /* Empty / Loading / Error states */
    .state-card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }
    .state-card .icon {
      font-size: 56px;
      margin-bottom: 18px;
      filter: grayscale(0.2);
    }
    .state-card h2 {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .state-card p {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 22px;
      line-height: 1.7;
    }
    .state-card .btn-new-analysis { display: inline-flex; }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, #eef2f6 25%, #f7f9fb 50%, #eef2f6 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 600px) {
      .top-bar { flex-direction: column; align-items: stretch; }
      .top-bar .user-area { justify-content: flex-end; }
      .hero { padding: 24px; }
      .hero h1 { font-size: 22px; }
      .reports-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">

    <!-- Top Bar -->
    <header class="top-bar">
      <a href="index.html" class="brand" style="text-decoration:none;color:inherit;">
        <div class="brand-icon">📊</div>
        <span>تقاريري</span>
      </a>
      <div class="user-area">
        <span class="user-name" id="userName">جاري التحميل...</span>
        <button type="button" class="btn-logout" id="logoutBtn">تسجيل خروج</button>
      </div>
    </header>

    <!-- Hero -->
    <section class="hero">
      <div>
        <h1 id="welcomeMsg">أهلاً بك 👋</h1>
        <p class="greeting" id="greetingMsg">إدارة تقاريرك السابقة وإطلاق تحاليل جديدة بسهولة</p>
      </div>
      <a href="scan.html" class="btn-new-analysis">
        <span>+</span>
        <span>تحليل جديد</span>
      </a>
    </section>

    <!-- Stats -->
    <section class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="label">إجمالي التقارير</div>
        <div class="value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="label">مكتملة</div>
        <div class="value completed" id="statCompleted">—</div>
      </div>
      <div class="stat-card">
        <div class="label">قيد التحليل</div>
        <div class="value pending" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="label">متوسط النتيجة</div>
        <div class="value" id="statAvg">—</div>
      </div>
    </section>

    <h2 class="section-title">تقاريرك</h2>

    <!-- Reports Container -->
    <div id="reportsContainer">
      <!-- Loading skeleton -->
      <div class="reports-grid" id="loadingSkeleton">
        <div class="report-card">
          <div class="skeleton" style="height: 24px; width: 70%; margin-bottom: 10px;"></div>
          <div class="skeleton" style="height: 14px; width: 90%; margin-bottom: 16px;"></div>
          <div class="skeleton" style="height: 80px; width: 100%; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 36px; width: 100%;"></div>
        </div>
        <div class="report-card">
          <div class="skeleton" style="height: 24px; width: 60%; margin-bottom: 10px;"></div>
          <div class="skeleton" style="height: 14px; width: 85%; margin-bottom: 16px;"></div>
          <div class="skeleton" style="height: 80px; width: 100%; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 36px; width: 100%;"></div>
        </div>
        <div class="report-card">
          <div class="skeleton" style="height: 24px; width: 75%; margin-bottom: 10px;"></div>
          <div class="skeleton" style="height: 14px; width: 80%; margin-bottom: 16px;"></div>
          <div class="skeleton" style="height: 80px; width: 100%; margin-bottom: 12px;"></div>
          <div class="skeleton" style="height: 36px; width: 100%;"></div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/my-reports.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الإدارة - مقياس الثقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1000px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #0C2340; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: right; }
        th { background: #0C2340; color: #fff; }
        .badge { padding: 5px 10px; border-radius: 20px; font-weight: bold; color: white; display: inline-block; font-size: 13px;}
        .badge-danger { background: #FF3B30; }
        .badge-warning { background: #FFCC00; color: #333; }
        .badge-success { background: #34C759; }
        .action-btn { background: #25D366; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: 'Cairo';}
        .action-btn:hover { background: #128C7E; }
        .stats-row { display: flex; gap: 20px; margin-bottom: 30px; margin-top: 20px; }
        .stat-card { flex: 1; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #00F2FE; }
        .stat-card h3 { margin: 0; font-size: 16px; color: #666; }
        .stat-card .value { font-size: 32px; font-weight: 800; color: #0C2340; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 لوحة تحكم العملاء المستهدفين (Brand Trust Leads)</h1>
        <p>العملاء الذين يعانون من ضعف الثقة ويمكن استهدافهم لخدماتك:</p>
        <div class="stats-row">
            <div class="stat-card">
                <h3>👥 إجمالي العملاء</h3>
                <div class="value" id="totalLeads">0</div>
            </div>
            <div class="stat-card">
                <h3>⚖️ متوسط الثقة</h3>
                <div class="value" id="avgTrust">0%</div>
            </div>
            <div class="stat-card" style="border-bottom-color: #FF3B30;">
                <h3>🚨 عملاء بخطر (فرصة بيع)</h3>
                <div class="value" id="dangerLeads" style="color:#FF3B30;">0</div>
            </div>
        </div>
        
        <table id="leadsTable">
            <thead>
                <tr>
                    <th>#</th>
                    <th>الاسم</th>
                    <th>الهاتف</th>
                    <th>البريد الإلكتروني</th>
                    <th>حالة الثقة</th>
                    <th>تاريخ التسجيل</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody>
                 <tr>
                    <td colspan="7" style="text-align:center; padding: 30px; color:#888;">جاري جلب البيانات من قاعدة البيانات...</td>
                 </tr>
            </tbody>
        </table>
        
        <div style="text-align:center; margin-top: 30px;">
            <button id="logoutBtn" style="background:#FF3B30; color:#fff; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">تسجيل الخروج المبرمج</button>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>

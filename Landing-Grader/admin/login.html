<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - إدارة مقياس الثقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0C2340; color: #fff; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-box { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); width: 350px; text-align: center; backdrop-filter: blur(10px); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00E5FF; border: none; color: #0C2340; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #00B4DB; color: #fff; }
        .error { color: #FF3B30; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🛡️ دخول الإدارة</h2>
        <p>نظام توليد عملاء الثقة</p>
        <div id="errorMsg" class="error"></div>
        <form id="loginForm">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="password" id="password" placeholder="كلمة المرور" required>
            <button type="submit">الدخول للوحة</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                const res = await fetch('../api/admin/auth.php', {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = 'dashboard.html';
                } else {
                    const err = document.getElementById('errorMsg');
                    err.innerText = data.message;
                    err.style.display = 'block';
                }
            } catch (err) {
                alert('خطأ في الاتصال بالخادم!');
            }
        });
    </script>
</body>
</html>
